name: ListeningFirst
options:
  bundleIdPrefix: com.ymzuiku
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AppShell:
    path: ../../app-shell/ios

targets:
  ListeningFirst:
    type: application
    platform: iOS
    sources:
      - path: ListeningFirst
        excludes:
          - "**/.DS_Store"
    resources:
      - path: ListeningFirst/Resources
    dependencies:
      - package: AppShell
    settings:
      base:
        DEVELOPMENT_TEAM: QUKNH2D57C
        INFOPLIST_FILE: ListeningFirst/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ymzuiku.ListeningFirst
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ListeningFirst/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 先搞定听力
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSSpeechRecognitionUsageDescription: "需要语音识别权限来进行听力练习"
        NSMicrophoneUsageDescription: "需要麦克风权限来录制您的语音"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
