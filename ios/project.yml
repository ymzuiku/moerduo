name: ListeningFirst
options:
  bundleIdPrefix: com.ymzuiku
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "202603300318"

packages:
  AppShell:
    path: ../../app-shell/ios
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main

targets:
  ListeningFirst:
    type: application
    platform: iOS
    sources:
      - path: ListeningFirst
        excludes:
          - "**/.DS_Store"
    resources:
      - path: ListeningFirst/Resources
    dependencies:
      - package: AppShell
      - product: MLXLLM
        package: mlx-swift-lm
      - product: MLXLMCommon
        package: mlx-swift-lm
    settings:
      base:
        DEVELOPMENT_TEAM: QUKNH2D57C
        INFOPLIST_FILE: ListeningFirst/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ymzuiku.moerduo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: ListeningFirst/ListeningFirst.entitlements
    info:
      path: ListeningFirst/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 磨耳朵
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "用于拍摄头像照片"
        NSSpeechRecognitionUsageDescription: "需要语音识别权限来进行听力练习"
        NSMicrophoneUsageDescription: "需要麦克风权限来录制您的语音"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.555010677252-e2cbci6okaoj34naqoa81reiq1nqfod5
            CFBundleURLName: google-signin
